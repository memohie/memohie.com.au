<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memohie | Transport & Logistics</title>
    <style>
        /* --- 1. CORE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #050505; /* Deep professional dark theme */
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- 2. NAVIGATION (LOGO) --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 5%;
            display: flex;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }

        .logo img {
            height: 60px; /* Adjust height as needed */
            width: auto;
            transition: transform 0.4s ease;
        }

        /* --- 3. HERO SECTION WITH TRANSITION --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.4);
            /* This creates the smooth cinematic zoom on load */
            animation: cinematicZoom 15s infinite alternate ease-in-out;
        }

        @keyframes cinematicZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .hero-text h1 {
            font-size: 4rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s forwards ease-out 0.5s;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: #ccc;
            opacity: 0;
            animation: fadeInUp 1s forwards ease-out 0.8s;
        }

        /* --- 4. IMAGE SECTION (THE REVEAL) --- */
        .container {
            padding: 100px 10%;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .img-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .img-wrapper img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .img-wrapper:hover img {
            transform: scale(1.1);
        }

        .img-caption {
            padding: 20px;
            background: #111;
            text-align: center;
        }

        /* --- 5. ANIMATIONS --- */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav>
        <div class="logo">
            <!-- Ensure your logo file is named logo.png in the same folder -->
            <img src="logo.png" alt="Memohie Logo">
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero">
        <img src="https://images.unsplash.com/photo-1501700489910-fb264f378a5b?q=80&w=2000" class="hero-image" alt="Transport Background">
        <div class="hero-text">
            <h1>MEMOHIE</h1>
            <p>Moving Australia Forward with Precision</p>
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <section class="container">
        <div class="services-grid">
            
            <div class="reveal">
                <div class="img-wrapper">
                    <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=1200" alt="Freight">
                </div>
                <div class="img-caption">
                    <h3>Freight Logistics</h3>
                </div>
            </div>

            <div class="reveal">
                <div class="img-wrapper">
                    <img src="https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?q=80&w=1200" alt="Warehouse">
                </div>
                <div class="img-caption">
                    <h3>Secure Storage</h3>
                </div>
            </div>

            <div class="reveal">
                <div class="img-wrapper">
                    <img src="https://images.unsplash.com/photo-1578575437130-527eed3abbec?q=80&w=1200" alt="Fleet">
                </div>
                <div class="img-caption">
                    <h3>Fleet Management</h3>
                </div>
            </div>

        </div>
    </section>

    <script>
        // Trigger the "reveal" animation on scroll
        function revealOnScroll() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 100;

                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }

        window.addEventListener("scroll", revealOnScroll);
        // Run once on load to catch elements already in view
        revealOnScroll();
    </script>

</body>
</html>
