<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memohie | Premium Transport</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a0a0a;
            --accent: #0066ff; /* A crisp, modern blue */
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--primary);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 90px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px); /* Frosted glass effect */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo img {
            height: 45px;
            transition: transform 0.3s ease;
        }

        .logo img:hover {
            transform: scale(1.05);
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .hero-visual {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1519003722824-194d4455a60c?q=80&w=2000') center/cover no-repeat;
            transform: scale(1.1); /* Prep for zoom animation */
            animation: heroZoom 10s infinite alternate;
        }

        @keyframes heroZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .hero-text {
            position: relative;
            z-index: 5;
            text-align: center;
            max-width: 900px;
        }

        .hero-text h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 1s forwards ease-out 0.3s;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            opacity: 0;
            animation: slideUp 1s forwards ease-out 0.6s;
        }

        /* --- MODERN IMAGE GRID --- */
        .content-section {
            padding: 100px 8%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        .image-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .image-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .image-container:hover img {
            transform: scale(1.1);
        }

        .overlay-text {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }

        /* --- BUTTONS --- */
        .btn-modern {
            padding: 15px 40px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-modern:hover {
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.4);
            transform: translateY(-2px);
        }

        /* --- ANIMATIONS --- */
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .hero-text h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <!-- Ensure your logo.png is in the same folder -->
            <img src="logo.png" alt="Memohie">
        </div>
        <a href="#contact" class="btn-modern" style="padding: 10px 25px; font-size: 0.9rem;">Contact</a>
    </nav>

    <header class="hero">
        <div class="hero-visual"></div>
        <div class="hero-text">
            <h1>MEMOHIE</h1>
            <p>The Future of Australian Logistics. Fast, Reliable, Direct.</p>
            <a href="#work" class="btn-modern">View Our Fleet</a>
        </div>
    </header>

    <section class="content-section" id="work">
        <div class="grid">
            
            <div class="image-container reveal">
                <img src="https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?q=80&w=1200" alt="Trucking">
                <div class="overlay-text">
                    <h3>Heavy Haulage</h3>
                </div>
            </div>

            <div class="image-container reveal">
                <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=1200" alt="Logistics">
                <div class="overlay-text">
                    <h3>Smart Warehousing</h3>
                </div>
            </div>

            <div class="image-container reveal">
                <img src="https://images.unsplash.com/photo-1578575437130-527eed3abbec?q=80&w=1200" alt="Distribution">
                <div class="overlay-text">
                    <h3>National Distribution</h3>
                </div>
            </div>

        </div>
    </section>

    <script>
        // Smooth reveal on scroll using Intersection Observer
        const observerOptions = {
            threshold: 0.2
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach((el) => {
            observer.observe(el);
        });
    </script>

</body>
</html>
